name: Deploy

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ "${{ github.event_name }}" = "release" ]; then
              DIR=/home/studybuddy/live
              SERVICE=studybuddy-backend
            else
              DIR=/home/studybuddy/staging
              SERVICE=studybuddy-staging-backend
            fi

            cd $DIR/backend
            git pull origin main
            uv sync
            sudo systemctl restart $SERVICE

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            if [ "${{ github.event_name }}" = "release" ]; then
              DIR=/home/studybuddy/live
              SERVICE=studybuddy-frontend
            else
              DIR=/home/studybuddy/staging
              SERVICE=studybuddy-staging-frontend
            fi

            cd $DIR/frontend
            git pull origin main
            bun install --frozen-lockfile
            bun run build
            sudo systemctl restart $SERVICE
