services:
  postgres:
    image: postgres:15
    container_name: study-buddy-db
    environment:
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy123
      POSTGRES_DB: studybuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: