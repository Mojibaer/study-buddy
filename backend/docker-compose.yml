services:
  postgres:
    image: postgres:16
    container_name: study-buddy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: studybuddy123
      POSTGRES_DB: studybuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: