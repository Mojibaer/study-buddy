services:
  postgres:
    image: postgres:17
    container_name: studybuddy-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studybuddy-staging-network

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.2
    container_name: studybuddy-staging-weaviate
    restart: unless-stopped
    volumes:
      - weaviate_staging_data:/var/lib/weaviate
    ports:
      - "8100:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_API_USER}
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: ${WEAVIATE_API_USER}
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_API_BASED_MODULES: "true"
      CLUSTER_HOSTNAME: "studybuddy-staging-weaviate"
    networks:
      - studybuddy-staging-network

  redis:
    image: redis:7-alpine
    container_name: studybuddy-staging-redis
    restart: unless-stopped
    volumes:
      - redis_staging_data:/data
    ports:
      - "6379:6379"
    networks:
      - studybuddy-staging-network

  backend:
    image: ghcr.io/mojibaer/study-buddy-backend:staging
    container_name: studybuddy-staging-backend
    restart: unless-stopped
    # Secrets are fetched at runtime by `infisical run` (entrypoint in the
    # prod image). Only the Infisical connection details live here.
    environment:
      INFISICAL_API_URL: ${INFISICAL_API_URL}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
      INFISICAL_ENV: staging
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
    ports:
      - "127.0.0.1:8002:8001"
    # MinIO runs as a separate shared stack; reach it via the host's published port.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    networks:
      - studybuddy-staging-network

  frontend:
    image: ghcr.io/mojibaer/study-buddy-frontend:staging
    container_name: studybuddy-staging-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - backend
    networks:
      - studybuddy-staging-network

volumes:
  postgres_staging_data:
    driver: local
  weaviate_staging_data:
    driver: local
  redis_staging_data:
    driver: local

networks:
  studybuddy-staging-network:
    driver: bridge