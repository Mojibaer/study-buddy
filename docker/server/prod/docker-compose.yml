services:
  postgres:
    image: postgres:17
    container_name: studybuddy-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studybuddy-prod-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: studybuddy-prod-chromadb
    restart: unless-stopped
    volumes:
      - chroma_prod_data:/chroma/chroma
    ports:
      - "8101:8000"
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - studybuddy-prod-network

volumes:
  postgres_prod_data:
    driver: local
  chroma_prod_data:
    driver: local

networks:
  studybuddy-prod-network:
    driver: bridge