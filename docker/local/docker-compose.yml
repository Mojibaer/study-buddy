services:
  postgres:
    image: postgres:17
    container_name: studybuddy-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studybuddy-local-network

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.2
    container_name: studybuddy-local-weaviate
    restart: unless-stopped
    volumes:
      - weaviate_local_data:/var/lib/weaviate
    ports:
      - "8100:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_API_BASED_MODULES: "true"
      CLUSTER_HOSTNAME: "studybuddy-local-weaviate"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - studybuddy-local-network

  redis:
    image: redis:7-alpine
    container_name: studybuddy-local-redis
    restart: unless-stopped
    volumes:
      - redis_local_data:/data
    ports:
      - "6379:6379"
    networks:
      - studybuddy-local-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: studybuddy-local-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - studybuddy-local-network

  minio:
    image: minio/minio
    container_name: studybuddy-local-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_local_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - studybuddy-local-network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: dev
    container_name: studybuddy-local-backend
    restart: unless-stopped
    # Bind-mount the source for hot-reload. The anonymous volume keeps the
    # container's .venv (built into the image) from being shadowed by the host.
    volumes:
      - ../../backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8001:8001"
    environment:
      # Internal service names — not localhost — inside the Docker network.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_HTTP_PORT: 8080
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: 50051
      # Backend reaches MinIO internally as "minio:9000"...
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: studybuddy-dev
      MINIO_SECURE: "false"
      # ...but presigned URLs handed to the browser must use localhost.
      MINIO_PUBLIC_URL: http://localhost:9000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FRONTEND_BASE_URL: http://localhost:3000
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - studybuddy-local-network

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: dev
    container_name: studybuddy-local-frontend
    restart: unless-stopped
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    environment:
      # Baked into client bundle — the browser runs outside Docker, so localhost.
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend
    networks:
      - studybuddy-local-network

volumes:
  postgres_local_data:
    driver: local
  weaviate_local_data:
    driver: local
  redis_local_data:
    driver: local
  minio_local_data:
    driver: local
  backend_venv:
  frontend_node_modules:
  frontend_next:

networks:
  studybuddy-local-network:
    driver: bridge